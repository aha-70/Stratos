<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRATOS | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --accent: #00ff88; --card: #0d0d0d; --border: #1a1a1a; --text: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        
        /* HEADER DASHBOARD */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo { font-size: 22px; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: var(--accent); }
        .status { font-size: 10px; border: 1px solid var(--accent); color: var(--accent); padding: 4px 10px; border-radius: 20px; font-weight: 900; }

        /* WIDGETS */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 25px; position: relative; }
        .card h3 { font-size: 11px; color: #555; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 1px; }
        .val { font-size: 26px; font-weight: 900; }
        .val span { font-size: 14px; color: var(--accent); margin-left: 5px; }

        /* EFFET DE GRAPHIQUE */
        .chart { display: flex; align-items: flex-end; gap: 4px; height: 40px; margin-top: 10px; }
        .bar { flex: 1; background: var(--accent); border-radius: 2px; opacity: 0.2; }
        .bar.high { opacity: 1; height: 100%; }

        /* SECTION PAIEMENT (L'aimant à argent) */
        .upgrade-card {
            margin-top: 25px;
            background: linear-gradient(145deg, #00ff8815, #000);
            border: 1px solid var(--accent);
            padding: 25px;
            border-radius: 30px;
            text-align: center;
        }
        .upgrade-card h2 { font-size: 20px; margin-bottom: 10px; }
        .upgrade-card p { font-size: 13px; color: #888; margin-bottom: 20px; }

        .paypal-btn {
            display: block;
            background: #ffc439;
            color: #003087;
            text-decoration: none;
            padding: 16px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 16px;
            box-shadow: 0 10px 20px rgba(255, 196, 57, 0.2);
        }

        /* NAVIGATION BASSE */
        .nav-bottom {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(13, 13, 13, 0.8); backdrop-filter: blur(10px);
            border: 1px solid var(--border); padding: 15px 30px;
            border-radius: 50px; display: flex; gap: 40px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">STRA<span>TOS</span></div>
        <div class="status">FREE ACCESS</div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>Solde IA</h3>
            <div class="val">2,450<span>€</span></div>
            <div class="chart">
                <div class="bar" style="height: 40%"></div>
                <div class="bar" style="height: 60%"></div>
                <div class="bar high" style="height: 90%"></div>
            </div>
        </div>
        <div class="card">
            <h3>Santé Score</h3>
            <div class="val">88<span>%</span></div>
            <p style="font-size: 10px; color: var(--accent); margin-top: 10px;">• SYNC ACTIVE</p>
        </div>
    </div>

    <div class="upgrade-card">
        <h2>Activer l'IA Illimitée</h2>
        <p>Accédez aux prédictions financières et au coaching santé Stratos.</p>
        
        <a href="https://www.paypal.com/paypalme/TonNom/19.99" class="paypal-btn">
            PAYER 19.99€ (ACCÈS À VIE)
        </a>
    </div>

    <div class="card" style="margin-top: 20px;">
        <h3>Journal de bord</h3>
        <p style="font-size: 14px; color: #777;">Aucune activité suspecte détectée.</p>
    </div>

    <div class="nav-bottom">
        <span>🏠</span>
        <span style="opacity: 0.3;">💰</span>
        <span style="opacity: 0.3;">❤️</span>
        <span style="opacity: 0.3;">⚙️</span>
    </div>

</body>
</html>
