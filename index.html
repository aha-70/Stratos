<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRATOS | Elite Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* On remplace le noir par un dégradé de gris luxueux */
            --bg: #f4f4f2; 
            --panel: #ffffff;
            --accent: #2d5be3; /* Un bleu électrique premium */
            --text: #1a1a1a;
            --sub: #707070;
            --border: #e2e2e2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); }

        /* ÉCRAN DE CONNEXION ÉLÉGANT */
        #auth-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .logo { font-weight: 900; font-size: 32px; letter-spacing: -1.5px; margin-bottom: 30px; }
        .logo span { color: var(--accent); }

        .auth-box {
            background: var(--panel);
            padding: 40px 30px;
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            text-align: center;
        }

        input {
            width: 100%;
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 15px;
            border: 1px solid var(--border);
            background: #f9f9f9;
            font-size: 16px;
        }

        .btn-prime {
            width: 100%;
            background: var(--accent);
            color: white;
            padding: 18px;
            border-radius: 15px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(45, 91, 227, 0.2);
        }

        /* LE BOUTON PAYPAL QUI RESSOURCE */
        .paypal-area {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px dotted var(--border);
        }

        .paypal-btn {
            display: block;
            background: #0070ba; /* Bleu PayPal officiel */
            color: white;
            text-decoration: none;
            padding: 14px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
        }

        h1 { font-size: 24px; margin-bottom: 8px; }
        p { color: var(--sub); font-size: 14px; margin-bottom: 25px; }

    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="logo">STRA<span>TOS</span></div>
        
        <div class="auth-box">
            <h1>Bienvenue</h1>
            <p>Connectez-vous à votre OS personnel.</p>
            
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Mot de passe">
            
            <button class="btn-prime" onclick="alert('Connexion...')">ACCÉDER</button>

            <div class="paypal-area">
                <p style="margin-bottom:15px;">Pas de compte ?</p>
                <a href="https://www.paypal.com/paypalme/TonNom/19.99" class="paypal-btn">
                    S'inscrire via PayPal
                </a>
            </div>
        </div>
    </div>

</body>
</html>
