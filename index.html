<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRATOS | Dominez votre Routine</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #00ff88; 
            --card: #111111;
            --text: #ffffff;
            --sub: #888888;
            --border: #222222;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); }

        /* --- AUTH SCREEN --- */
        #auth-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: radial-gradient(circle at center, #00ff8810 0%, transparent 70%);
        }

        .logo { font-weight: 900; font-size: 35px; letter-spacing: -1px; margin-bottom: 30px; }
        .logo span { color: var(--accent); }

        .auth-box {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 35px;
            border-radius: 25px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 12px;
            color: white;
            margin-bottom: 15px;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); background: #222; }

        .btn-prime {
            width: 100%;
            background: var(--accent);
            color: #000;
            padding: 18px;
            border-radius: 12px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-prime:hover { transform: scale(1.02); box-shadow: 0 0 25px rgba(0,255,136,0.3); }

        /* --- DASHBOARD (Hidden by default) --- */
        #dashboard { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }

        .nav-dash { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }

        .locked::after {
            content: "🔒 RÉSERVÉ PRO";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: var(--accent);
            backdrop-filter: blur(4px);
        }

        /* --- PAYPAL SECTION --- */
        .pay-banner {
            background: linear-gradient(90deg, #00ff8820, transparent);
            border: 1px solid var(--accent);
            padding: 20px;
            border-radius: 15px;
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .paypal-btn {
            background: #ffc439;
            color: #003087;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            font-size: 14px;
            transition: 0.3s;
        }

        .paypal-btn:hover { background: #f4b400; transform: translateY(-2px); }

        h2 { color: var(--accent); margin-bottom: 15px; }
        .stat { font-size: 32px; font-weight: 900; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="logo">STRA<span>TOS</span></div>
        <div class="auth-box">
            <h2 style="color: white;">Connexion Sécurisée</h2>
            <p style="color: var(--sub); margin-bottom: 20px; font-size: 14px;">Entrez dans le cercle des 1%.</p>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Clé d'accès">
            <button class="btn-prime" onclick="login()">ACCÉDER AU SYSTÈME →</button>
        </div>
    </div>

    <div id="dashboard">
        <div class="nav-dash">
            <div class="logo">STRA<span>TOS</span></div>
            <div id="user-display" style="font-weight: 600;">Utilisateur : Gratuit</div>
        </div>

        <div class="grid">
            <div class="card">
                <h3>Santé</h3>
                <p style="color: var(--sub);">Pas aujourd'hui</p>
                <div class="stat">6,432</div>
            </div>

            <div class="card locked">
                <h3>IA Budget</h3>
                <div class="stat">-- €</div>
            </div>

            <div class="card locked">
                <h3>Bio-Métrie</h3>
                <div class="stat">-- bpm</div>
            </div>
        </div>

        <div class="pay-banner">
            <div>
                <h3 style="margin-bottom: 5px;">Débloquer la puissance totale</h3>
                <p style="font-size: 13px; color: var(--sub);">Activez Stratos Pro pour accéder aux analyses IA et au mode sombre total.</p>
            </div>
            <a href="https://www.paypal.com/paypalme/TonNom/19.99" class="paypal-btn" target="_blank"> PAYER VIA PAYPAL </a>
        </div>
    </div>

    <script>
        function login() {
            const email = document.getElementById('email').value;
            if(email.includes('@')) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else {
                alert("Veuillez entrer un email valide.");
            }
        }
    </script>
</body>
</html>
